components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    agentID:
      type: apiKey
      in: header
      name: x-auth-scope-agent-id
    agentNonce:
      type: apiKey
      in: header
      name: x-auth-scope-nonce
    agentSignature:
      type: apiKey
      in: header
      name: x-auth-scope-signature
  requestBodies:
    GenericJSON:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GenericObject" }
  parameters:
    AgentID:
      name: agent_id
      in: path
      required: true
      schema: { type: string }
    ExpansionID:
      name: expansion_id
      in: path
      required: true
      schema: { type: string }
    LeaseID:
      name: lease_id
      in: path
      required: true
      schema: { type: string }
    MissionRef:
      name: mission_ref
      in: path
      required: true
      schema: { type: string }
    ProjectionID:
      name: projection_id
      in: path
      required: true
      schema: { type: string }
    Tenant:
      name: tenant_id
      in: query
      schema: { type: string }
    Query:
      name: q
      in: query
      schema: { type: string }
    Status:
      name: status
      in: query
      schema: { type: string }
    State:
      name: state
      in: query
      schema: { type: string }
    Type:
      name: type
      in: query
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200 }
  responses:
    Error:
      description: Stable API error envelope.
      headers:
        X-Request-ID:
          schema: { type: string }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    ApiError:
      type: object
      properties:
        error: { type: string }
        code: { type: string }
        message: { type: string }
      required: [code, message]
    Principal:
      type: object
      properties:
        subject: { type: string }
        issuer: { type: string }
      required: [subject, issuer]
    Agent:
      type: object
      properties:
        provider: { type: string }
        client_id: { type: string }
        instance_id: { type: string }
      required: [provider, client_id, instance_id]
    ResourceGrant:
      type: object
      properties:
        type: { type: string }
        id: { type: string }
        actions: { type: array, items: { type: string } }
        constraints: { type: object, additionalProperties: true }
      required: [type, id, actions]
    AuthorityRegion:
      type: object
      properties:
        resources: { type: array, items: { $ref: "#/components/schemas/ResourceGrant" } }
        forbidden_actions: { type: array, items: { type: string } }
      required: [resources]
    Condition:
      type: object
      properties:
        id: { type: string }
        expression: { type: string }
        evaluation: { type: string }
        on_failure: { type: string }
      required: [id, expression]
    ConditionEvaluation:
      type: object
      properties:
        id: { type: string }
        expression: { type: string }
        result: { type: boolean }
        error: { type: string }
      required: [id, expression, result]
    Actor:
      type: object
      properties:
        agent_instance_id: { type: string }
        client_id: { type: string }
        key_thumbprint: { type: string }
      required: [agent_instance_id, client_id]
    ActionResource:
      type: object
      properties:
        type: { type: string }
        id: { type: string }
      required: [type, id]
    Action:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        resource: { $ref: "#/components/schemas/ActionResource" }
        operation: { type: string }
      required: [type, resource, operation]
    EvaluateRequest:
      type: object
      properties:
        mission_version_seen: { type: integer }
        actor: { $ref: "#/components/schemas/Actor" }
        action: { $ref: "#/components/schemas/Action" }
        context: { type: object, additionalProperties: true }
      required: [actor, action]
    Delegation:
      type: object
      additionalProperties: true
    Lifecycle:
      type: object
      additionalProperties: true
    Mission:
      type: object
      properties:
        mission_id: { type: string }
        mission_ref: { type: string }
        tenant_id: { type: string }
        state: { type: string }
        version: { type: integer }
        principal: { $ref: "#/components/schemas/Principal" }
        agent: { $ref: "#/components/schemas/Agent" }
        purpose: { type: object, additionalProperties: true }
        authority_region: { $ref: "#/components/schemas/AuthorityRegion" }
        conditions: { type: array, items: { type: object, additionalProperties: true } }
        lifecycle: { $ref: "#/components/schemas/Lifecycle" }
        delegation: { $ref: "#/components/schemas/Delegation" }
      required: [mission_id, mission_ref, tenant_id, state, version, principal, agent, purpose, authority_region, lifecycle, delegation]
    MissionProposal:
      type: object
      properties:
        proposal_id: { type: string }
        status: { type: string }
        tenant_id: { type: string }
        principal: { $ref: "#/components/schemas/Principal" }
        agent: { $ref: "#/components/schemas/Agent" }
        intent: { type: object, additionalProperties: true }
        authority_region: { $ref: "#/components/schemas/AuthorityRegion" }
        lifecycle: { $ref: "#/components/schemas/Lifecycle" }
        delegation: { $ref: "#/components/schemas/Delegation" }
        created_at: { type: string, format: date-time }
      required: [proposal_id, status, tenant_id, principal, agent, intent, authority_region, lifecycle, delegation, created_at]
    ExpansionRequest:
      type: object
      additionalProperties: true
    AgentIdentity:
      type: object
      additionalProperties: true
    ToolContract:
      type: object
      additionalProperties: true
    PolicyBundle:
      type: object
      properties:
        bundle_id: { type: string }
        tenant_id: { type: string }
        version: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        combining_algorithm: { type: string, enum: [first_applicable] }
        rules:
          type: array
          items: { $ref: "#/components/schemas/PolicyRule" }
        bundle_hash: { type: string }
        signature: { type: string }
        created_by: { $ref: "#/components/schemas/Principal" }
        activated_by: { $ref: "#/components/schemas/Principal" }
        created_at: { type: string, format: date-time }
        activated_at: { type: string, format: date-time }
      required: [bundle_id, version, status, rules]
    CreatePolicyBundleRequest:
      type: object
      properties:
        tenant_id: { type: string }
        version: { type: string }
        name: { type: string }
        description: { type: string }
        combining_algorithm: { type: string, enum: [first_applicable] }
        rules:
          type: array
          items: { $ref: "#/components/schemas/PolicyRule" }
      required: [version, rules]
    ActivatePolicyBundleRequest:
      type: object
      properties:
        reason: { type: string }
    PolicyRule:
      type: object
      properties:
        rule_id: { type: string }
        description: { type: string }
        priority: { type: integer }
        disabled: { type: boolean }
        effect: { type: string, enum: [allow, deny, require_approval, require_expansion, allow_with_constraints] }
        match: { $ref: "#/components/schemas/PolicyRuleMatch" }
        conditions:
          type: array
          items: { $ref: "#/components/schemas/Condition" }
        reason_codes: { type: array, items: { type: string } }
        human_reason: { type: string }
        constraints: { type: object, additionalProperties: true }
      required: [effect]
    PolicyRuleMatch:
      type: object
      properties:
        action_types: { type: array, items: { type: string } }
        operations: { type: array, items: { type: string } }
        resource_types: { type: array, items: { type: string } }
        resource_ids: { type: array, items: { type: string } }
        agent_client_ids: { type: array, items: { type: string } }
        principal_subjects: { type: array, items: { type: string } }
        base_decisions: { type: array, items: { type: string } }
    PolicyRuleResult:
      type: object
      properties:
        rule_id: { type: string }
        effect: { type: string }
        matched: { type: boolean }
        applied: { type: boolean }
        reason_codes: { type: array, items: { type: string } }
        condition_results:
          type: array
          items: { $ref: "#/components/schemas/ConditionEvaluation" }
        error: { type: string }
      required: [rule_id, matched]
    PolicyEvaluation:
      type: object
      properties:
        bundle_id: { type: string }
        tenant_id: { type: string }
        policy_version: { type: string }
        bundle_hash: { type: string }
        status: { type: string }
        rule_results:
          type: array
          items: { $ref: "#/components/schemas/PolicyRuleResult" }
      required: [policy_version]
    SimulatePolicyBundleRequest:
      type: object
      properties:
        mission_ref: { type: string }
        evaluation: { $ref: "#/components/schemas/EvaluateRequest" }
        base_decision: { type: string }
      required: [mission_ref, evaluation]
    SimulatePolicyBundleResponse:
      type: object
      properties:
        bundle_id: { type: string }
        tenant_id: { type: string }
        policy_version: { type: string }
        bundle_hash: { type: string }
        original_decision: { type: string }
        decision: { type: string }
        reason_codes: { type: array, items: { type: string } }
        human_reason: { type: string }
        constraints: { type: object, additionalProperties: true }
        policy_evaluation: { $ref: "#/components/schemas/PolicyEvaluation" }
        rule_results:
          type: array
          items: { $ref: "#/components/schemas/PolicyRuleResult" }
      required: [bundle_id, policy_version, original_decision, decision, policy_evaluation]
    Projection:
      type: object
      additionalProperties: true
    EventRecord:
      type: object
      additionalProperties: true
    ContainmentRule:
      type: object
      additionalProperties: true
    CreateGitHubRepositoryBindingRequest:
      type: object
      properties:
        tenant_id: { type: string }
        owner: { type: string }
        repo: { type: string }
        repository: { type: string, description: "Repository in owner/repo form." }
        default_branch: { type: string }
        installation_id: { type: integer, format: int64 }
        mission_ref: { type: string }
        branch_patterns: { type: array, items: { type: string } }
        required_checks: { type: array, items: { type: string } }
        metadata: { type: object, additionalProperties: { type: string } }
    GitHubRepositoryBinding:
      type: object
      additionalProperties: true
      properties:
        binding_id: { type: string }
        tenant_id: { type: string }
        repository: { type: string }
        mission_ref: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
      required: [binding_id, repository, status, created_at]
    GitHubWebhookResponse:
      type: object
      additionalProperties: true
      properties:
        accepted: { type: boolean }
        status: { type: string }
        event: { type: string }
        delivery_id: { type: string }
        repository: { type: string }
        binding_id: { type: string }
        mission_ref: { type: string }
      required: [accepted, status, event, delivery_id]
    GitHubChangedFile:
      type: object
      properties:
        path: { type: string }
        status: { type: string }
        operation: { type: string }
        additions: { type: integer }
        deletions: { type: integer }
      required: [path]
    GitHubCheckRunPlanRequest:
      type: object
      properties:
        mission_ref: { type: string }
        mission_version_seen: { type: integer }
        actor: { type: object, additionalProperties: true }
        repository: { type: string }
        pull_request: { type: integer }
        head_sha: { type: string }
        branch: { type: string }
        changed_files:
          type: array
          items: { $ref: "#/components/schemas/GitHubChangedFile" }
        context: { type: object, additionalProperties: true }
      required: [actor, repository, head_sha, changed_files]
    GitHubCheckRunPlanResponse:
      type: object
      additionalProperties: true
      properties:
        name: { type: string }
        external_id: { type: string }
        repository: { type: string }
        head_sha: { type: string }
        status: { type: string }
        conclusion: { type: string }
        title: { type: string }
        summary: { type: string }
        mission_ref: { type: string }
        mission_version: { type: integer }
        evaluations:
          type: array
          items: { type: object, additionalProperties: true }
      required: [name, external_id, repository, head_sha, status, conclusion, title, summary, mission_ref, evaluations]
    CreateOktaAppBindingRequest:
      type: object
      properties:
        tenant_id: { type: string }
        issuer: { type: string, description: "Okta issuer, for example https://example.okta.com/oauth2/default." }
        authorization_server_id: { type: string }
        client_id: { type: string }
        app_id: { type: string }
        app_label: { type: string }
        mission_ref: { type: string }
        required_groups: { type: array, items: { type: string } }
        admin_groups: { type: array, items: { type: string } }
        allowed_subjects: { type: array, items: { type: string } }
        group_claim: { type: string }
        subject_claim: { type: string }
        scope_claim: { type: string }
        group_match_mode: { type: string, enum: [any, all] }
        metadata: { type: object, additionalProperties: { type: string } }
      required: [issuer, client_id, mission_ref]
    OktaAppBinding:
      type: object
      additionalProperties: true
      properties:
        binding_id: { type: string }
        tenant_id: { type: string }
        issuer: { type: string }
        authorization_server_id: { type: string }
        discovery_url: { type: string }
        jwks_uri: { type: string }
        client_id: { type: string }
        app_id: { type: string }
        app_label: { type: string }
        mission_ref: { type: string }
        required_groups: { type: array, items: { type: string } }
        admin_groups: { type: array, items: { type: string } }
        allowed_subjects: { type: array, items: { type: string } }
        group_claim: { type: string }
        subject_claim: { type: string }
        scope_claim: { type: string }
        group_match_mode: { type: string }
