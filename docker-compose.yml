services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: authscope
      POSTGRES_USER: authscope
      POSTGRES_PASSWORD: authscope
    ports:
      - "${AUTH_SCOPE_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authscope -d authscope"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  auth-scope:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-scope:mvp
    environment:
      AUTH_SCOPE_ADDR: ":8080"
      AUTH_SCOPE_DECISION_SECRET: "dev-compose-decision-secret-change-me"
      AUTH_SCOPE_ADMIN_CREDENTIALS: '[{"token":"dev-compose-admin-alice","subject":"alice@example.com","issuer":"https://idp.example.com"},{"token":"dev-compose-admin-bob","subject":"bob@example.com","issuer":"https://idp.example.com"}]'
      DATABASE_URL: "postgres://authscope:authscope@postgres:5432/authscope?sslmode=disable"
    ports:
      - "${AUTH_SCOPE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: auth-scope-frontend:mvp
    ports:
      - "${AUTH_SCOPE_FRONTEND_PORT:-3000}:8080"
    depends_on:
      auth-scope:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
