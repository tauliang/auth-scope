services:
  auth-scope:
    build:
      context: .
      dockerfile: Dockerfile
    image: auth-scope:mvp
    environment:
      AUTH_SCOPE_ADDR: ":8080"
    ports:
      - "${AUTH_SCOPE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
