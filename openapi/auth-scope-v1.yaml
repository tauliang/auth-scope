openapi: 3.1.0
info:
  title: Auth Scope Operator API
  version: 1.0.0
  description: Read and decision endpoints consumed by the Auth Scope operator console.
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health.
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: string } }
        default: { $ref: "#/components/responses/Error" }
  /.well-known/mission-authority:
    get:
      operationId: getMissionAuthorityDiscovery
      security: []
      responses:
        "200":
          description: Mission authority discovery document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /.well-known/authzen-configuration:
    get:
      operationId: getAuthZENDiscovery
      security: []
      responses:
        "200":
          description: AuthZEN discovery document.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /access/v1/evaluation:
    post:
      operationId: evaluateAuthZEN
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: AuthZEN single evaluation decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /access/v1/evaluations:
    post:
      operationId: evaluateAuthZENBatch
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: AuthZEN batch evaluation decisions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/admin/session:
    get:
      operationId: getAdminSession
      responses:
        "200":
          description: Authenticated administrator context.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminSession" }
        default: { $ref: "#/components/responses/Error" }
  /v1/operations/summary:
    get:
      operationId: getOperationsSummary
      parameters:
        - $ref: "#/components/parameters/Tenant"
      responses:
        "200":
          description: Current operator dashboard counters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationsSummary" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions:
    get:
      operationId: listMissions
      parameters: &listParameters
        - $ref: "#/components/parameters/Tenant"
        - $ref: "#/components/parameters/Query"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/State"
        - $ref: "#/components/parameters/Type"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Mission page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissionPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/evaluate:
    post:
      operationId: evaluateMission
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Mission-scoped authorization decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/authority/negotiations:
    post:
      operationId: createAuthorityNegotiation
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Authority negotiation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/expansion-requests:
    post:
      operationId: createExpansionRequest
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Expansion request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpansionRequest" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/resume:
    post:
      operationId: resumeMission
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Mission resume decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/delegate:
    post:
      operationId: delegateMission
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Delegated child mission.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/revoke:
    post:
      operationId: revokeMission
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Revoked mission.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/complete:
    post:
      operationId: completeMission
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Completed mission.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/introspect:
    get:
      operationId: introspectMission
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      responses:
        "200":
          description: Mission detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Mission" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/lineage:
    get:
      operationId: getMissionLineage
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      responses:
        "200":
          description: Mission lineage graph.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/projections:
    post:
      operationId: createProjection
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Signed external projection.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/missions/{mission_ref}/leases:
    post:
      operationId: createMissionLease
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      parameters:
        - $ref: "#/components/parameters/MissionRef"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Mission lease decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/mission-proposals:
    post:
      operationId: createMissionProposal
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Created mission proposal.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listMissionProposals
      parameters: *listParameters
      responses:
        "200":
          description: Mission proposal page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProposalPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/mission-proposals/{proposal_id}:
    get:
      operationId: getMissionProposal
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Mission proposal.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissionProposal" }
        default: { $ref: "#/components/responses/Error" }
  /v1/mission-proposals/{proposal_id}/approve:
    post:
      operationId: approveMissionProposal
      parameters:
        - name: proposal_id
          in: path
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Activated mission.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/expansion-requests:
    get:
      operationId: listExpansionRequests
      parameters: *listParameters
      responses:
        "200":
          description: Expansion request page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpansionPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/expansion-requests/{expansion_id}:
    get:
      operationId: getExpansionRequest
      parameters:
        - $ref: "#/components/parameters/ExpansionID"
      responses:
        "200":
          description: Expansion request.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExpansionRequest" }
        default: { $ref: "#/components/responses/Error" }
  /v1/expansion-requests/{expansion_id}/approve:
    post:
      operationId: approveExpansionRequest
      parameters:
        - $ref: "#/components/parameters/ExpansionID"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Expansion approval decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/expansion-requests/{expansion_id}/deny:
    post:
      operationId: denyExpansionRequest
      parameters:
        - $ref: "#/components/parameters/ExpansionID"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Expansion denial decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/expansion-requests/{expansion_id}/approvals:
    post:
      operationId: submitExpansionApproval
      parameters:
        - $ref: "#/components/parameters/ExpansionID"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Recorded expansion approval.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/agents:
    post:
      operationId: registerAgent
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Registered agent identity.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listAgents
      parameters: *listParameters
      responses:
        "200":
          description: Agent identity page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/agents/{agent_id}:
    get:
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: Agent identity.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentIdentity" }
        default: { $ref: "#/components/responses/Error" }
  /v1/agents/{agent_id}/revoke:
    post:
      operationId: revokeAgent
      parameters:
        - $ref: "#/components/parameters/AgentID"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Revoked agent identity.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentIdentity" }
        default: { $ref: "#/components/responses/Error" }
  /v1/agents/{agent_id}/lineage:
    get:
      operationId: getAgentLineage
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: Agent lineage graph.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/tool-contracts:
    post:
      operationId: registerToolContract
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Registered tool contract.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolContract" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listToolContracts
      parameters: *listParameters
      responses:
        "200":
          description: Tool contract page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolContractPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/tool-contracts/{tool_name}:
    get:
      operationId: getToolContract
      parameters:
        - name: tool_name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tool contract.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToolContract" }
        default: { $ref: "#/components/responses/Error" }
  /v1/tool-calls/authorize:
    post:
      operationId: authorizeToolCall
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Tool-call authorization decision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections:
    get:
      operationId: listProjections
      parameters: *listParameters
      responses:
        "200":
          description: Projection page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectionPage" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections/{projection_id}/status:
    get:
      operationId: getProjectionStatus
      parameters:
        - $ref: "#/components/parameters/ProjectionID"
      responses:
        "200":
          description: Projection status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections/{projection_id}/revoke:
    post:
      operationId: revokeProjection
      parameters:
        - $ref: "#/components/parameters/ProjectionID"
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Revoked projection status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections/verify:
    post:
      operationId: verifyProjection
      security: []
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Projection verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections/exchange:
    post:
      operationId: exchangeProjectionToken
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "201":
          description: Scoped brokered credential token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/projections/credentials/verify:
    post:
      operationId: verifyCredentialAccessToken
      security: []
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "200":
          description: Brokered credential verification result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericObject" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/github/repositories:
    post:
      operationId: createGitHubRepositoryBinding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGitHubRepositoryBindingRequest" }
      responses:
        "201":
          description: GitHub repository binding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitHubRepositoryBinding" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listGitHubRepositoryBindings
      responses:
        "200":
          description: GitHub repository bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:
                    type: array
                    items: { $ref: "#/components/schemas/GitHubRepositoryBinding" }
                required: [repositories]
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/github/webhooks:
    post:
      operationId: ingestGitHubWebhook
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema: { type: string }
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema: { type: string }
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema: { type: string }
      requestBody: { $ref: "#/components/requestBodies/GenericJSON" }
      responses:
        "202":
          description: Accepted GitHub webhook delivery.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitHubWebhookResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/github/check-runs/plan:
    post:
      operationId: planGitHubCheckRun
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GitHubCheckRunPlanRequest" }
      responses:
        "200":
          description: GitHub check-run payload that an integration worker can publish.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitHubCheckRunPlanResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/okta/app-bindings:
    post:
      operationId: createOktaAppBinding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOktaAppBindingRequest" }
      responses:
        "201":
          description: Okta application binding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OktaAppBinding" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listOktaAppBindings
      responses:
        "200":
          description: Okta application bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_bindings:
                    type: array
                    items: { $ref: "#/components/schemas/OktaAppBinding" }
                required: [app_bindings]
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/okta/authority-context/resolve:
    post:
      operationId: resolveOktaAuthorityContext
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveOktaAuthorityContextRequest" }
      responses:
        "200":
          description: Canonical mission authority context resolved from verified Okta claims.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OktaAuthorityContextResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/entra/app-registrations:
    post:
      operationId: createEntraAppRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEntraAppRegistrationRequest" }
      responses:
        "201":
          description: Entra application registration binding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntraAppRegistration" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listEntraAppRegistrations
      responses:
        "200":
          description: Entra application registration bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_registrations:
                    type: array
                    items: { $ref: "#/components/schemas/EntraAppRegistration" }
                required: [app_registrations]
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/entra/authority-context/resolve:
    post:
      operationId: resolveEntraAuthorityContext
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResolveEntraAuthorityContextRequest" }
      responses:
        "200":
          description: Canonical mission authority context resolved from verified Entra claims.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntraAuthorityContextResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/slack/workspace-bindings:
    post:
      operationId: createSlackWorkspaceBinding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSlackWorkspaceBindingRequest" }
      responses:
        "201":
          description: Slack workspace binding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SlackWorkspaceBinding" }
        default: { $ref: "#/components/responses/Error" }
    get:
      operationId: listSlackWorkspaceBindings
      responses:
        "200":
          description: Slack workspace bindings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace_bindings:
                    type: array
                    items: { $ref: "#/components/schemas/SlackWorkspaceBinding" }
                required: [workspace_bindings]
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/slack/message-actions/authorize:
    post:
      operationId: authorizeSlackMessageAction
      security: [{ agentSignature: [], agentID: [], agentNonce: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AuthorizeSlackMessageActionRequest" }
      responses:
        "200":
          description: Slack message authorization response with optional mission evaluation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SlackMessageAuthorizationResponse" }
        default: { $ref: "#/components/responses/Error" }
  /v1/integrations/atlassian/site-bindings:
    post:
      operationId: createAtlassianSiteBinding
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAtlassianSiteBindingRequest" }
      responses:
        "201":
          description: Atlassian site binding for Jira and Confluence.
          content:
            application/json:
